<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart RTO Appointment System</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f6f8;
    }

    header {
      background: #2c3e50;
      color: white;
      padding: 15px;
      text-align: center;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      margin: 20px auto;
      max-width: 400px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      font-size: 16px;
    }

    button {
      background: #27ae60;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: #219150;
    }

    #message {
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<header>
  <h1>🚗 Smart RTO Appointment System</h1>
</header>

<div class="container">

  <div class="card">
    <h2>Book Appointment</h2>

    <input type="number" id="user_id" placeholder="Enter User ID">
    <input type="number" id="slot_id" placeholder="Enter Slot ID">

    <button onclick="bookAppointment()">Book Appointment</button>

    <p id="message"></p>
  </div>

</div>

<script>
/* 🔁 CHANGE THIS IF YOUR PORT IS DIFFERENT */
const BASE_URL = "http://localhost:5000/api";

async function bookAppointment() {
  const user_id = document.getElementById("user_id").value;
  const slot_id = document.getElementById("slot_id").value;

  if (!user_id || !slot_id) {
    document.getElementById("message").innerHTML = "⚠️ Fill all fields";
    return;
  }

  try {
    const response = await fetch(`${BASE_URL}/appointments/book`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        user_id: Number(user_id),
        slot_id: Number(slot_id)
      })
    });

    const data = await response.json();

    if (response.ok) {
      document.getElementById("message").innerHTML =
        "✅ " + (data.message || "Appointment Booked");
    } else {
      document.getElementById("message").innerHTML =
        "❌ " + (data.message || "Booking failed");
    }

  } catch (error) {
    document.getElementById("message").innerHTML =
      "❌ Cannot connect to backend";
  }
}
</script>

</body>
</html>
