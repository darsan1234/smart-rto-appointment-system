<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart RTO Appointment System</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f6f8;
    }

    header {
      background: #2c3e50;
      color: white;
      padding: 15px;
      text-align: center;
    }

    nav {
      background: #34495e;
      padding: 10px;
      text-align: center;
    }

    nav a {
      color: white;
      margin: 10px;
      text-decoration: none;
      font-weight: bold;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      margin: 20px 0;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    input, button {
      padding: 10px;
      margin: 8px 0;
      width: 100%;
      font-size: 16px;
    }

    button {
      background: #2ecc71;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: #27ae60;
    }
  </style>
</head>

<body>

<header>
  <h1>🚗 Smart RTO Appointment System</h1>
</header>

<nav>
  <a href="#">Home</a>
  <a href="#book">Book Appointment</a>
</nav>

<div class="container">

  <!-- SERVICES -->
  <div class="card">
    <h2>Available Services</h2>
    <ul>
      <li>Driving License</li>
      <li>Learner License</li>
      <li>Vehicle Registration</li>
      <li>Ownership Transfer</li>
    </ul>
  </div>

  <!-- BOOKING -->
  <div class="card" id="book">
    <h2>Book Appointment</h2>

    <input type="number" id="user_id" placeholder="Enter User ID">
    <input type="number" id="slot_id" placeholder="Enter Slot ID">

    <button onclick="bookAppointment()">Book Appointment</button>

    <p id="message"></p>
  </div>

</div>

<script>
const BASE_URL = "http://localhost:5000/api"; // 🔁 change after deploy

// BOOK APPOINTMENT
async function bookAppointment() {
  const user_id = document.getElementById("user_id").value;
  const slot_id = document.getElementById("slot_id").value;

  if (!user_id || !slot_id) {
    alert("Please enter User ID and Slot ID");
    return;
  }

  try {
    const response = await fetch(`${BASE_URL}/appointments/book`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        user_id: parseInt(user_id),
        slot_id: parseInt(slot_id)
      })
    });

    const data = await response.json();

    document.getElementById("message").innerHTML =
      "✅ " + data.message;

  } catch (error) {
    document.getElementById("message").innerHTML =
      "❌ Failed to connect to backend";
  }
}
</script>

</body>
</html>
